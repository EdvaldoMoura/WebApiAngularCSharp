<div class="container mt-5">
    <h1>{{descricaoTitulo}}</h1>
    <form [formGroup]="usuarioForm" (ngSubmit)="submit()">
        <div class="form-group mt-3">
            <label class="form-label">Nome</label>
            <input type="text" class="form-control" placeholder="Digite seu nome" formControlName="nome" >
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Digite seu email" formControlName="email">
        </div>
        <div class="form-group">
            <label class="form-label">Cargo</label>
            <input type="text" class="form-control" placeholder="Digite seu cargo" formControlName="cargo">
        </div>
        <div class="form-group">
            <label class="form-label">Salário</label>
            <input type="number" step="any" class="form-control" placeholder="Digite seu salário"
                formControlName="salario">
        </div>
        <div class="form-group">
            <label class="form-label">Cpf</label>
            <input type="text" class="form-control" placeholder="Digite seu cpf" formControlName="cpf">
        </div>
        <div class="form-group">
            <label class="form-label">Situação</label>
            <select class="form-select" formControlName="situacao">
                <option value="">Selecione uma situação</option>
                <option value="true" selected>Ativo</option>
                <option value="false">Inativo</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="text" class="form-control" placeholder="Digite sua senha" formControlName="senha">
        </div>
        <div class="d-flex mt-3" *ngIf="!disabled">
            <button type="submit" class="btn btn-success mx-2">{{btnAcao}}</button>
            <button type="reset" class="btn btn-danger mx-2" routerLink="/">Cancelar</button>
        </div>
        <div class="d-flex mt-3" *ngIf="disabled">
            <button type="button" class="btn btn-secondary mx-2" routerLink="/">Voltar</button>
        </div>
    </form>
</div>
